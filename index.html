<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ─── Supabase init ────────────────────────────────
const SUPABASE_URL = 'https://gvrfbdxhgbfqotcnapga.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HJ4RSvoC3T3xPYLqxhRMlw_KHkuNlbt';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── State ────────────────────────────────────────
let currentUser    = null;
let currentProfile = null;
let allPosts       = [];
let liked          = {};
let muted          = true;
let currentVisible = null;
let selectedAvatar = '🦊';
let selectedCategory = '🌿 Natureza';
let selectedFileBlobUrl = '';
let selectedFile = null;

// ─── Helpers ──────────────────────────────────────
window.showToast = function(msg, dur=2500){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
};

function fmt(n){
  if(!n) return '0';
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1).replace('.0','')+'K';
  return String(n);
}

// ─── Screens ──────────────────────────────────────
window.showScreen = function(id, botEl){
  document.querySelectorAll('.slide-video').forEach(v=>{try{v.pause();}catch(e){}});
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  
  const targetScreen = document.getElementById(id);
  if (targetScreen) targetScreen.classList.add('active');
  
  if(botEl){
    document.querySelectorAll('.bot-btn').forEach(b=>b.classList.remove('active'));
    botEl.classList.add('active');
  }
  if(id==='profile-screen') renderProfile();
  if(id==='post-screen') resetPostForm();
  if(id==='feed-screen') setTimeout(()=>{if(currentVisible) playSlide(currentVisible);},100);
};

// ─── Auth ─────────────────────────────────────────
window.switchAuthTab = function(tab){
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('form-login').style.display   = tab==='login'?'flex':'none';
  document.getElementById('form-register').style.display = tab==='register'?'flex':'none';
};

window.pickAvatar = function(el){
  document.querySelectorAll('.avatar-opt').forEach(a=>a.classList.remove('selected'));
  el.classList.add('selected');
  selectedAvatar = el.dataset.av;
};

async function fetchProfileAndLoadApp() {
  if (!currentUser) return;
  try {
    const { data, error } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
    if (!error && data) currentProfile = data;
  } catch(e) { console.log(e); }
  
  await loadFeed();
  showScreen('feed-screen');
}

window.doLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('show');

  if(!email || !pass) return showToast('Preencha todos os campos');

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if(error) throw error;
    currentUser = data.user;
    await fetchProfileAndLoadApp();
  } catch(e) {
    errEl.textContent = e.message || 'Erro ao entrar';
    errEl.classList.add('show');
  }
};

window.doRegister = async function() {
  const name = document.getElementById('reg-name').value.trim();
  const user = document.getElementById('reg-user').value.trim().replace('@','');
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value.trim();
  const errEl = document.getElementById('register-error');
  errEl.classList.remove('show');

  if(!name || !user || !email || !pass) return showToast('Preencha todos os campos');

  try {
    const { data, error } = await supabase.auth.signUp({ email, password: pass });
    if(error) throw error;
    if(data.user) {
      currentUser = data.user;
      const { error: pErr } = await supabase.from('profiles').insert([{
        id: data.user.id,
        name: name,
        username: user,
        avatar: selectedAvatar,
        bio: 'Criando conteúdos incríveis no AiCarly! ✨'
      }]);
      if(pErr) throw pErr;
      await fetchProfileAndLoadApp();
    }
  } catch(e) {
    errEl.textContent = e.message || 'Erro ao registrar';
    errEl.classList.add('show');
  }
};

window.doGuestLogin = async function() {
  currentUser = null;
  currentProfile = null;
  await loadFeed();
  showScreen('feed-screen');
};

window.doLogout = async function() {
  await supabase.auth.signOut();
  currentUser = null;
  currentProfile = null;
  location.reload();
};

// ─── Feed & Video Engine ──────────────────────────
async function loadFeed() {
  try {
    const { data, error } = await supabase
      .from('posts')
      .select('*, profiles(name, username, avatar)')
      .order('created_at', { ascending: false });
    
    if(!error && data) {
      allPosts = data;
      renderFeed(allPosts);
    }
  } catch(e) { console.log(e); }
}

function renderFeed(posts) {
  const feedEl = document.getElementById('feed');
  feedEl.innerHTML = '';

  if(posts.length === 0) {
    feedEl.innerHTML = `<div class="slide" style="display:flex;align-items:center;justify-content:center;color:var(--text-dim);">Nenhum vídeo encontrado.</div>`;
    return;
  }

  posts.forEach((post, index) => {
    const profile = post.profiles || { name: 'Usuário', username: 'user', avatar: '👤' };
    const isLiked = liked[post.id] ? 'liked' : '';
    const tagsHTML = post.tags ? post.tags.split(',').map(t => `<span class="slide-tag">${t.trim()}</span>`).join('') : '';

    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.dataset.id = post.id;
    slide.innerHTML = `
      <video class="slide-video" src="${post.video_url}" loop playsinline muted></video>
      <div class="play-tap" onclick="handleVideoTap(this)">
        <div class="play-pulse">▶</div>
      </div>
      <div class="slide-rail">
        <div class="rail-line"><div class="rail-line-fill" id="rail-fill-${post.id}"></div></div>
        <div class="rail-num">VÍDEO ${index + 1}</div>
      </div>
      <div class="slide-content">
        <div class="slide-user">
          <div class="slide-user-avatar">${profile.avatar}</div>
          <div class="slide-user-name">@${profile.username}</div>
        </div>
        <div class="slide-cat">${post.category || 'Geral'}</div>
        <div class="slide-title">${post.title}</div>
        <div class="slide-desc">${post.description || ''}</div>
        <div class="slide-tags">${tagsHTML}</div>
      </div>
      <div class="slide-actions">
        <div class="action-avatar">
          ${profile.avatar}
          <div class="follow-dot">＋</div>
        </div>
        <div class="action-btn ${isLiked}" onclick="toggleLike('${post.id}', this)">
          <div class="action-icon">❤️</div>
          <div class="action-count" id="like-count-${post.id}">${fmt(post.likes_count || 0)}</div>
        </div>
        <div class="action-btn" onclick="showToast('Compartilhamento em breve!')">
          <div class="action-icon">🚀</div>
          <div class="action-count">Fwd</div>
        </div>
      </div>
      <div class="slide-progress"><div class="slide-progress-fill" id="progress-${post.id}"></div></div>
    `;
    feedEl.appendChild(slide);
  });

  setupScrollObserver();
}

function setupScrollObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting) {
        currentVisible = entry.target;
        playSlide(currentVisible);
      } else {
        const v = entry.target.querySelector('.slide-video');
        if(v) v.pause();
      }
    });
  }, { scope: document.getElementById('feed'), threshold: 0.6 });

  document.querySelectorAll('.slide').forEach(s => observer.observe(s));
}

function playSlide(slideEl) {
  const video = slideEl.querySelector('.slide-video');
  if(!video) return;

  video.muted = muted;
  video.play().catch(e => console.log("Autoplay bloqueado pelo navegador"));

  const pFill = slideEl.querySelector('.slide-progress-fill');
  const rFill = slideEl.querySelector('.rail-line-fill');
  
  video.ontimeupdate = () => {
    const pct = (video.currentTime / video.duration) * 100;
    if(pFill) pFill.style.width = pct + '%';
    if(rFill) rFill.style.height = pct + '%';
  };
}

window.handleVideoTap = function(tapEl) {
  const slide = tapEl.closest('.slide');
  const video = slide.querySelector('.slide-video');
  const pulse = tapEl.querySelector('.play-pulse');

  if(video.paused) {
    video.play();
    pulse.textContent = '▶';
  } else {
    video.pause();
    pulse.textContent = '⏸';
  }

  pulse.classList.add('show');
  setTimeout(() => { pulse.classList.remove('show'); pulse.classList.add('hide'); }, 400);
  setTimeout(() => pulse.classList.remove('hide'), 600);
};

window.toggleMute = function() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  document.querySelectorAll('.slide-video').forEach(v => v.muted = muted);
};

window.toggleLike = async function(postId, btnEl) {
  if(!currentUser) return showToast('Crie uma conta para curtir vídeos!');
  
  const countEl = document.getElementById(`like-count-${postId}`);
  let currentCount = parseInt(countEl.textContent.replace('K','000').replace('M','000000')) || 0;

  if(liked[postId]) {
    liked[postId] = false;
    btnEl.classList.remove('liked');
    currentCount--;
    await supabase.rpc('decrement_likes', { post_id: postId }).catch(()=>{});
  } else {
    liked[postId] = true;
    btnEl.classList.add('liked');
    currentCount++;
    createHeartBurst(btnEl);
    await supabase.rpc('increment_likes', { post_id: postId }).catch(()=>{});
  }
  countEl.textContent = fmt(currentCount);
};

function createHeartBurst(el) {
  const b = document.createElement('div');
  b.className = 'heart-burst';
  b.textContent = '❤️';
  b.style.left = '50%'; b.style.top = '50%';
  el.appendChild(b);
  setTimeout(() => b.remove(), 700);
}

// ─── Search ───────────────────────────────────────
window.openSearch = function() {
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').focus();
};

window.closeSearch = function() {
  document.getElementById('search-overlay').classList.remove('open');
};

window.doSearch = function(val) {
  const query = val.toLowerCase().trim();
  const filtered = allPosts.filter(p => 
    p.title.toLowerCase().includes(query) || 
    (p.category && p.category.toLowerCase().includes(query)) ||
    (p.tags && p.tags.toLowerCase().includes(query))
  );
  
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = '';

  filtered.forEach(post => {
    const item = document.createElement('div');
    item.className = 'search-result-item';
    item.onclick = () => { closeSearch(); renderFeed([post]); };
    item.innerHTML = `
      <div class="search-thumb color-purple">🎬</div>
      <div class="info">
        <div class="title">${post.title}</div>
        <div class="meta">${post.category || 'Geral'} • ${fmt(post.likes_count)} curtidas</div>
      </div>
    `;
    resultsEl.appendChild(item);
  });
};

window.setNav = function(type, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if(type === 'seguindo') {
    showToast('Aba Seguindo em desenvolvimento. Mostrando recomendados.');
  }
  renderFeed(allPosts);
};

// ─── Post / Upload Engine ─────────────────────────
window.previewVideoFile = function(input) {
  const file = input.files[0];
  if(!file) return;
  if(file.type !== 'video/mp4') {
    showToast('Apenas arquivos MP4 são suportados');
    input.value = '';
    return;
  }
  
  selectedFile = file;
  selectedFileBlobUrl = URL.createObjectURL(file);
  
  const preview = document.getElementById('post-preview');
  preview.innerHTML = `<video src="${selectedFileBlobUrl}" controls muted></video>`;
};

window.selectCat = function(el) {
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedCategory = el.textContent;
};

window.publishVideo = async function() {
  if(!currentUser) return showToast('Entre na sua conta para publicar vídeos.');
  if(!selectedFile) return showToast('Selecione um arquivo de vídeo primeiro.');

  const title = document.getElementById('post-title').value.trim();
  const desc = document.getElementById('post-desc').value.trim();
  const tags = document.getElementById('post-tags').value.trim();

  if(!title) return showToast('Dê um título ao seu vídeo.');

  const publishBtn = document.querySelector('.post-publish-btn');
  publishBtn.disabled = true;
  publishBtn.textContent = 'Enviando...';

  try {
    const fileExt = selectedFile.name.split('.').pop();
    const fileName = `${Math.random()}_${Date.now()}.${fileExt}`;
    const filePath = `${currentUser.id}/${fileName}`;

    const { data: uploadData, error: uploadErr } = await supabase.storage
      .from('videos')
      .upload(filePath, selectedFile);

    if(uploadErr) throw uploadErr;

    const { data: urlData } = supabase.storage.from('videos').getPublicUrl(filePath);
    const videoUrl = urlData.publicUrl;

    const { error: dbErr } = await supabase.from('posts').insert([{
      user_id: currentUser.id,
      title: title,
      description: desc,
      video_url: videoUrl,
      category: selectedCategory,
      tags: tags,
      likes_count: 0
    }]);

    if(dbErr) throw dbErr;

    document.getElementById('post-form-body').style.display = 'none';
    document.getElementById('post-success').classList.add('show');
  } catch(e) {
    showToast(e.message || 'Erro ao publicar seu vídeo');
    publishBtn.disabled = false;
    publishBtn.textContent = 'Publicar';
  }
};

window.resetPostForm = function() {
  document.getElementById('post-form-body').style.display = 'block';
  document.getElementById('post-success').classList.remove('show');
  document.getElementById('post-title').value = '';
  document.getElementById('post-desc').value = '';
  document.getElementById('post-tags').value = '';
  document.getElementById('post-file').value = '';
  document.getElementById('post-preview').innerHTML = `<div class="post-preview-placeholder"><span>🎬</span><span>Escolha um arquivo acima</span></div>`;
  selectedFile = null;
  if(selectedFileBlobUrl) URL.revokeObjectURL(selectedFileBlobUrl);
};

window.afterPublish = async function() {
  await loadFeed();
  showScreen('feed-screen');
};

// ─── Profile Engine ───────────────────────────────
async function renderProfile() {
  if(!currentUser) {
    document.getElementById('profile-name').textContent = 'Visitante';
    document.getElementById('profile-handle').textContent = '@visitante';
    document.getElementById('profile-grid').innerHTML = '';
    document.getElementById('profile-empty').style.display = 'block';
    return;
  }

  if(currentProfile) {
    document.getElementById('profile-avatar').textContent = currentProfile.avatar || '🦊';
    document.getElementById('profile-name').textContent = currentProfile.name;
    document.getElementById('profile-handle').textContent = `@${currentProfile.username}`;
    document.getElementById('profile-bio').textContent = currentProfile.bio || '';
  }

  try {
    const { data: myPosts, error } = await supabase
      .from('posts')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });

    const grid = document.getElementById('profile-grid');
    const empty = document.getElementById('profile-empty');
    grid.innerHTML = '';

    if(!error && myPosts && myPosts.length > 0) {
      empty.style.display = 'none';
      
      let totalLikes = 0;
      document.getElementById('stat-videos').textContent = myPosts.length;

      myPosts.forEach(post => {
        totalLikes += (post.likes_count || 0);
        const thumb = document.createElement('div');
        thumb.className = 'profile-video-thumb';
        thumb.onclick = () => { renderFeed([post]); showScreen('feed-screen'); };
        thumb.innerHTML = `<video src="${post.video_url}" muted></video>`;
        grid.appendChild(thumb);
      });

      document.getElementById('stat-likes').textContent = fmt(totalLikes);
    } else {
      empty.style.display = 'block';
      document.getElementById('stat-videos').textContent = '0';
      document.getElementById('stat-likes').textContent = '0';
    }
  } catch(e) { console.log(e); }
}

// ─── Global App Lifecycle (VERSÃO ANTI-TRAVAMENTO) ─────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const splash = document.getElementById('splash-screen');
  
  const fallbackTimeout = setTimeout(() => {
    if (splash && splash.classList.contains('active')) {
      splash.classList.remove('active');
      showScreen('auth-screen');
      showToast("Conexão instável. Indo para a tela de início...");
    }
  }, 4000);

  try {
    const { data: { session }, error } = await supabase.auth.getSession();
    if (error) throw error;

    if (session && session.user) {
      currentUser = session.user;
      
      try {
        const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        if (data) currentProfile = data;
      } catch(pErr) { 
        console.warn("Aviso: Perfil não encontrado.", pErr); 
      }
      
      try {
        await loadFeed();
      } catch(fErr) { 
        console.warn("Aviso: Falha ao carregar feed.", fErr); 
      }
      
      clearTimeout(fallbackTimeout);
      splash.classList.remove('active');
      showScreen('feed-screen');
    } else {
      clearTimeout(fallbackTimeout);
      splash.classList.remove('active');
      showScreen('auth-screen');
    }
  } catch (err) {
    console.error("Erro crítico na inicialização:", err);
    clearTimeout(fallbackTimeout);
    splash.classList.remove('active');
    showScreen('auth-screen');
    showToast("Erro ao conectar ao Supabase.");
  }
});
</script>
